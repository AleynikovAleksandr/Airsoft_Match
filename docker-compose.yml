version: "3.9"

services:
  airsoft-api:
    build: .
    image: airsoft-api:latest
    container_name: airsoft_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Персистентные данные: модели, БД, исходные данные
      - ./model:/app/model
      - ./database:/app/database
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - MODEL_DIR=model
      - DATABASE_URL=sqlite:///./database/users.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # Даём время на загрузку моделей
